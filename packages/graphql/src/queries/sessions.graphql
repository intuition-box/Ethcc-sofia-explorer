query GetSessionAttendees($predicateId: String!, $sessionAtomId: String!) {
  triples(
    where: {
      predicate: { term_id: { _eq: $predicateId } }
      object: { term_id: { _eq: $sessionAtomId } }
    }
    order_by: { created_at: asc }
  ) {
    term_id
    created_at
    subject { term_id label }
    term {
      vaults {
        position_count
        total_shares
        total_assets
      }
    }
  }
}

query GetAllSessionAttendees($predicateId: String!, $sessionAtomIds: [String!]!) {
  triples(
    where: {
      predicate: { term_id: { _eq: $predicateId } }
      object: { term_id: { _in: $sessionAtomIds } }
    }
    order_by: { created_at: asc }
    limit: 500
  ) {
    term_id
    created_at
    object { term_id }
    subject { term_id label }
    term {
      vaults {
        position_count
        total_shares
      }
    }
  }
}
