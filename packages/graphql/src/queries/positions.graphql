query GetAccountPositions($address: String!, $limit: Int!) {
  positions(
    where: { account_id: { _ilike: $address }, shares: { _gt: "0" } }
    limit: $limit
    order_by: { shares: desc }
  ) {
    shares
    vault {
      term_id
      current_share_price
      term {
        atom {
          term_id
          label
          type
        }
        triple {
          subject { term_id label }
          predicate { term_id label }
          object { term_id label }
        }
      }
    }
  }
}

query GetUserVotedPositions($address: String!, $termIds: [String!]!) {
  positions(
    where: {
      account_id: { _ilike: $address }
      term_id: { _in: $termIds }
      shares: { _gt: "0" }
    }
  ) {
    term_id
  }
}

query GetPositionsAggregate($termIds: [String!]!) {
  positions_aggregate(
    where: { term_id: { _in: $termIds }, shares: { _gt: "0" } }
  ) {
    aggregate {
      count
    }
  }
}
